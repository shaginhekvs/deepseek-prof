<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .gpu { fill: #ffffff; stroke: #1e293b; stroke-width: 2; rx: 14; }
      .close { stroke: #047857; stroke-width: 8; stroke-linecap: round; }
      .far { stroke: #dc2626; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 16 12; }
      .text { font-family: Inter, Arial, sans-serif; fill: #111827; font-size: 24px; font-weight: 800; }
      .sub { font-family: Inter, Arial, sans-serif; fill: #374151; font-size: 17px; }
      .title { font-family: Inter, Arial, sans-serif; fill: #0f172a; font-size: 34px; font-weight: 800; }
      .green { fill: #047857; font-weight: 800; }
      .red { fill: #dc2626; font-weight: 800; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="60" y="60">A10 topology: two closer GPU islands</text>

  <rect class="gpu" x="130" y="155" width="180" height="110"/>
  <text class="text" x="185" y="205">GPU0</text>
  <text class="sub" x="165" y="235">NUMA 0</text>

  <rect class="gpu" x="410" y="155" width="180" height="110"/>
  <text class="text" x="465" y="205">GPU1</text>
  <text class="sub" x="445" y="235">NUMA 0</text>

  <rect class="gpu" x="130" y="380" width="180" height="110"/>
  <text class="text" x="185" y="430">GPU2</text>
  <text class="sub" x="165" y="460">NUMA 1</text>

  <rect class="gpu" x="410" y="380" width="180" height="110"/>
  <text class="text" x="465" y="430">GPU3</text>
  <text class="sub" x="445" y="460">NUMA 1</text>

  <line class="close" x1="310" y1="210" x2="410" y2="210"/>
  <line class="close" x1="310" y1="435" x2="410" y2="435"/>
  <line class="far" x1="220" y1="265" x2="220" y2="380"/>
  <line class="far" x1="500" y1="265" x2="500" y2="380"/>
  <line class="far" x1="310" y1="240" x2="410" y2="405"/>

  <text class="sub green" x="325" y="190">NODE</text>
  <text class="sub green" x="325" y="415">NODE</text>
  <text class="sub red" x="240" y="328">SYS</text>
  <text class="sub red" x="520" y="328">SYS</text>

  <rect class="gpu" x="720" y="160" width="360" height="150"/>
  <text class="text" x="760" y="205">Measured large transfer</text>
  <text class="sub" x="760" y="240">0 -> 1: 21.96 GB/s</text>
  <text class="sub" x="760" y="270">0 -> 2: 18.55 GB/s</text>

  <rect class="gpu" x="720" y="355" width="360" height="150"/>
  <text class="text" x="760" y="400">Placement rule</text>
  <text class="sub" x="760" y="435">Keep frequent MoE/TP traffic</text>
  <text class="sub" x="760" y="465">inside 0-1 or 2-3 when possible.</text>
</svg>
