<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .box { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 10; }
      .accent { fill: #e8f3ff; stroke: #1769aa; stroke-width: 2; rx: 10; }
      .gpu { fill: #eaf7ef; stroke: #16733a; stroke-width: 2; rx: 10; }
      .text { font-family: Inter, Arial, sans-serif; fill: #1f2933; font-size: 24px; font-weight: 700; }
      .sub { font-family: Inter, Arial, sans-serif; fill: #3e4c59; font-size: 17px; }
      .arrow { stroke: #52606d; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .title { font-family: Inter, Arial, sans-serif; fill: #102a43; font-size: 34px; font-weight: 800; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52606d"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <text class="title" x="60" y="58">PyTorch to GPU: the inference path</text>

  <rect class="box" x="60" y="110" width="190" height="110"/>
  <text class="text" x="92" y="155">Model Code</text>
  <text class="sub" x="88" y="185">vLLM DeepSeek</text>

  <path class="arrow" d="M250 165 H310"/>

  <rect class="accent" x="310" y="110" width="190" height="110"/>
  <text class="text" x="350" y="155">Dynamo</text>
  <text class="sub" x="344" y="185">graph capture</text>

  <path class="arrow" d="M500 165 H560"/>

  <rect class="accent" x="560" y="110" width="190" height="110"/>
  <text class="text" x="605" y="155">ATen / FX</text>
  <text class="sub" x="600" y="185">operator graph</text>

  <path class="arrow" d="M750 165 H810"/>

  <rect class="accent" x="810" y="110" width="190" height="110"/>
  <text class="text" x="858" y="155">Inductor</text>
  <text class="sub" x="838" y="185">IR and codegen</text>

  <path class="arrow" d="M905 220 V280"/>

  <rect class="box" x="710" y="280" width="190" height="110"/>
  <text class="text" x="755" y="325">Triton</text>
  <text class="sub" x="744" y="355">generated kernels</text>

  <path class="arrow" d="M710 335 H650"/>

  <rect class="box" x="460" y="280" width="190" height="110"/>
  <text class="text" x="500" y="325">vLLM Ops</text>
  <text class="sub" x="490" y="355">C / custom IR ops</text>

  <path class="arrow" d="M460 335 H400"/>

  <rect class="gpu" x="210" y="280" width="190" height="110"/>
  <text class="text" x="255" y="325">CUDA</text>
  <text class="sub" x="242" y="355">GPU timeline</text>

  <text class="sub" x="60" y="455">Profiler work maps names at the bottom back to operations at the top.</text>
</svg>
